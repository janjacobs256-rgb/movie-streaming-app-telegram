name: Build and Release Beta

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_NAME: 0.1.0.${{ github.run_number }}
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      build_name: ${{ env.BUILD_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: >
          flutter build apk --release
          --build-name=${{ env.BUILD_NAME }}
          --build-number=${{ env.BUILD_NUMBER }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build_android]
    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta-${{ needs.build_android.outputs.build_name }}
          name: Beta ${{ needs.build_android.outputs.build_name }}
          body: |
            ## Beta ${{ needs.build_android.outputs.build_name }}

            Automated build from commit ${{ github.sha }}

            ### Download
            - **Android APK**: install directly on your device
          files: app-release.apk
          draft: false
          prerelease: true
